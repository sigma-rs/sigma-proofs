
[package]
name = "sigma-proofs"
version = "0.3.0"
authors = [
    "Nugzari Uzoevi <nougzarm@icloud.com>",
    "Michele Orrù <m@orru.net>",
    "Ian Goldberg <iang@uwaterloo.ca>",
    "Victor Snyder-Graf <victor@subgraf.dev>",
    "Lénaïck Gouriou <lg@leanear.io>",
]
edition.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
documentation = "https://docs.rs/sigma-proofs"
categories.workspace = true
keywords = ["cryptography", "zero-knowledge", "NIZK", "sigma-protocols"]
description = "A toolkit for auto-generated implementations of Σ-protocols"
exclude = [".gitignore"]
[workspace]
members = [".", "hash2group"]

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sigma-rs/sigma-proofs"
categories = ["cryptography"]

[workspace.dependencies]
bytemuck = { version = "1.25.0", default-features = false }
curve25519-dalek = { version = "4.1.3", default-features = false }
digest = { version = "0.11.2", default-features = false }
elliptic-curve = { version = "0.13.8", default-features = false }
hex-literal = "0.4"
k256 = { version = "0.13.4", default-features = false }
p256 = { version = "0.13", default-features = false }
sha2 = { version = "0.11", default-features = false }
sha3 = { version = "0.11.0", default-features = false }

[features]
# Include commonly used curved in default features.
# Increases the default compile times, but makes the crate just-work for most users.
default = ["std", "bls12_381", "curve25519-dalek", "k256", "p256"]
std = [
    "thiserror",
    "rand",
    "num-bigint/std",
    "num-traits/std",
    "rand_core/std",
    "spongefish/std",
]
bls12_381 = ["dep:bls12_381", "spongefish/bls12_381"]
curve25519-dalek = ["dep:curve25519-dalek", "spongefish/curve25519-dalek"]
k256 = ["dep:k256", "spongefish/k256"]
p256 = ["dep:p256", "spongefish/p256"]

[dependencies]
ahash = { version = "0.8", default-features = false }
bls12_381 = { version = "0.8.0", default-features = false, features = ["groups"], optional = true }
bytemuck = { workspace = true }
curve25519-dalek = { workspace = true, features = ["alloc", "group"], optional = true }
ff = { version = "0.13", features = ["derive"] }
group = "0.13.0"
hashbrown = { version = "0.15", default-features = false }
k256 = { workspace = true, features = ["arithmetic", "alloc", "expose-field"], optional = true }
keccak = { version = "0.1.5", default-features = false }
num-bigint = { version = "0.4.6", default-features = false }
num-traits = { version = "0.2.19", default-features = false, features = ["libm"] }
p256 = { workspace = true, features = ["arithmetic", "expose-field"], optional = true }
rand = { version = "0.8.5", optional = true }
rand_core = { version = "0.6", default-features = false }
sha3 = { workspace = true }
spongefish = { version = "0.5", features = ["derive"] }
subtle = { version = "2.6.1", default-features = false }
thiserror = { version = "1", optional = true }
zerocopy = { version = "0.8", default-features = false }
zeroize = { version = "1.8.1", default-features = false, features = ["alloc"] }

[dev-dependencies]
anyhow = "1.0.100"
bls12_381 = "0.8.0"
curve25519-dalek = { workspace = true, features = ["serde", "rand_core", "alloc", "digest", "precomputed-tables", "group"] }
divan = "0.1.21"
hex = "0.4"
hex-literal = { workspace = true }
json = "0.12.4"
k256 = { workspace = true, features = ["arithmetic"] }
libtest-mimic = "0.8.1"
p256 = { workspace = true, features = ["arithmetic"] }
rand_chacha = { version = "0.3.1" }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
serde_with = { version = "3.16.1", features = ["hex"] }
serial_test = "3.3.1"
sha2 = { workspace = true }
spongefish = { version = "0.5", features = ["curve25519-dalek", "p256", "bls12_381", "derive", "keccak", "std"] }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
core_affinity2 = "0.15.4"

[[test]]
name = "dudect"
required-features = ["curve25519-dalek", "std"]

[[test]]
name = "test_composition"
required-features = ["curve25519-dalek", "std"]

[[test]]
name = "test_relations"
required-features = ["bls12_381", "std"]

[[test]]
name = "instance_validation"
required-features = ["curve25519-dalek", "std"]

[[test]]
name = "verifier_rejection"
required-features = ["curve25519-dalek", "std"]

[[test]]
name = "spec_vectors"
required-features = ["bls12_381", "std"]

[[example]]
name = "schnorr"
required-features = ["curve25519-dalek", "std"]

[[example]]
name = "simple_composition"
required-features = ["curve25519-dalek", "std"]

[[bench]]
name = "msm"
harness = false
required-features = ["std"]

[profile.dev]
# Makes tests run much faster at the cost of slightly longer builds and worse debug info.
opt-level = 1
